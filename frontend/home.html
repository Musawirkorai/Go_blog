<link rel="stylesheet" href="style.css" />
<body>
  <div class="home-container">
    <header class="home-header">
      <h1>DevFeast</h1>
      <p>Welcome back, <strong id="username">Writer</strong></p>

      <!-- // The logout function will be defined in script.js -->
      <button onclick="logout()" class="logout-btn">Logout</button>
    </header>

    <div class="editor-card">
      <h2>Create a Masterpiece</h2>
      <input type="text" id="postTitle" placeholder="Catchy Title..." />
      <textarea
        id="postContent"
        placeholder="Write your thoughts here..."
      ></textarea>
      <button onclick="createPost()">Publish Story</button>
    </div>
    <div class="search-bar">
      <input 
        type="text" 
        id="searchInput" 
        placeholder="🔍 Search posts..." 
        oninput="filterPosts()"
      >
    </div>
    <h2 style="margin-bottom: 25px;">The Feed</h2>
    <div id="blogFeed"></div>
    <div class="pagination">
    <button onclick="changePage(-1)" id="prevBtn">← Prev</button>
    <span id="pageLabel">Page 1</span>
    <button onclick="changePage(1)" id="nextBtn">Next →</button>
  </div>

    
<!-- 
    <h2 style="margin-bottom: 25px">The Feed</h2>
    <div id="blogFeed"></div> -->
  </div>

  <script src="script.js"></script>
  <script>
    window.onload = getPosts;
  </script>
</body>
